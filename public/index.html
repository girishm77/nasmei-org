<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Managed Website</title>
    <meta name="description" content="A static website managed through GitHub and deployed on DigitalOcean App Platform.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="site-title">
        <p class="eyebrow">GitHub + DigitalOcean</p>
        <h1 id="site-title">Managed Website</h1>
        <p class="lede">This site is ready to manage in GitHub and deploy through DigitalOcean App Platform.</p>
      </section>

      <section class="status" aria-label="Site status">
        <div>
          <span class="label">Source</span>
          <strong>GitHub repository</strong>
        </div>
        <div>
          <span class="label">Hosting</span>
          <strong>DigitalOcean App Platform</strong>
        </div>
        <div>
          <span class="label">Deploys</span>
          <strong>Automatic from main</strong>
        </div>
      </section>
    </main>
  </body>
</html>
