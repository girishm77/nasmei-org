name: nasmei-org
region: nyc
domains:
  - domain: nasmei.org
    type: PRIMARY
    zone: nasmei.org
    minimum_tls_version: "1.2"
  - domain: www.nasmei.org
    type: ALIAS
    zone: nasmei.org
    minimum_tls_version: "1.2"
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
static_sites:
  - name: web
    environment_slug: html
    github:
      repo: girishm77/nasmei-org
      branch: main
      deploy_on_push: true
    source_dir: /
    output_dir: public
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
